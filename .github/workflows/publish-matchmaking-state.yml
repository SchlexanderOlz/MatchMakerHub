name: Publish gn-matchmaking-state

on:
  push:
    branches: [main]
    paths:
      - matchmaking-state/Cargo.toml
      - matchmaking-state/src/**
      # Also re-publish if the derive macro it depends on is updated
      - matchmaking-state/redisadapter-derive/Cargo.toml
      - matchmaking-state/redisadapter-derive/src/**

jobs:
  publish-derive:
    uses: ./.github/workflows/publish-redisadapter-derive.yml
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    needs: publish-derive
    defaults:
      run:
        working-directory: matchmaking-state
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check version against crates.io
        id: check
        run: |
          LOCAL=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PUBLISHED=$(curl -sf https://crates.io/api/v1/crates/gn-matchmaking-state \
            -H 'User-Agent: github-actions publish-check' \
            | jq -r '.crate.newest_version // "none"')
          echo "local=$LOCAL"
          echo "published=$PUBLISHED"
          [ "$LOCAL" != "$PUBLISHED" ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Publish
        if: steps.check.outputs.changed == 'true'
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
